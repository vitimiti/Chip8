name: CI

on:
    push:
    pull_request:

jobs:
    build:
        name: Build (${{ matrix.configuration }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                configuration:
                    - Debug
                    - Internal
                    - Release

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Restore
              run: dotnet restore Chip8/Chip8.csproj

            - name: Build
              run: dotnet build -c ${{ matrix.configuration }} --no-restore Chip8/Chip8.csproj
