name: Release Artifacts

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    publish:
        name: Publish (${{ matrix.rid }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                rid:
                    - win-x86
                    - win-x64
                    - win-arm64
                    - linux-x64
                    - linux-arm64
                    - osx-arm64

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Restore
              run: dotnet restore Chip8/Chip8.csproj

            - name: Compute version metadata
              id: version
              shell: bash
              run: |
                  set -euo pipefail
                  tag="${GITHUB_REF_NAME}"
                  version="${tag#v}"
                  echo "tag=${tag}" >> "$GITHUB_OUTPUT"
                  echo "version=${version}" >> "$GITHUB_OUTPUT"

            - name: Publish
              run: >-
                  dotnet publish Chip8/Chip8.csproj
                  -c Release
                  -r ${{ matrix.rid }}
                  --self-contained true
                  -p:Version=${{ steps.version.outputs.version }}
                  -p:FileVersion=${{ steps.version.outputs.version }}
                  -p:InformationalVersion=${{ steps.version.outputs.tag }}
                  -p:ContinuousIntegrationBuild=true
                  --output artifacts/publish/${{ matrix.rid }}

            - name: Download SDL3 3.4.10 for Windows targets
              if: startsWith(matrix.rid, 'win-')
              shell: bash
              run: |
                  set -euo pipefail
                  curl -fL -o sdl-win.zip https://github.com/libsdl-org/SDL/releases/download/release-3.4.10/SDL3-devel-3.4.10-VC.zip
                  unzip -q sdl-win.zip -d sdl-win

                  case "${{ matrix.rid }}" in
                    win-x86) sdl_arch="x86" ;;
                    win-x64) sdl_arch="x64" ;;
                    win-arm64) sdl_arch="arm64" ;;
                    *) echo "Unsupported Windows RID: ${{ matrix.rid }}"; exit 1 ;;
                  esac

                  sdl_dll_path="$(find sdl-win -type f -path "*/lib/${sdl_arch}/SDL3.dll" | head -n 1)"
                  if [[ -z "${sdl_dll_path}" ]]; then
                    echo "Could not find SDL3.dll for architecture ${sdl_arch}."
                    exit 1
                  fi

                  cp "${sdl_dll_path}" "artifacts/publish/${{ matrix.rid }}/SDL3.dll"

            - name: Upload publish artifact
              uses: actions/upload-artifact@v4
              with:
                  name: publish-${{ matrix.rid }}
                  path: artifacts/publish/${{ matrix.rid }}

            - name: Package publish output per runtime
              if: matrix.rid != 'osx-arm64'
              shell: bash
              run: |
                  set -euo pipefail
                  rid="${{ matrix.rid }}"
                  tag="${{ steps.version.outputs.tag }}"
                  source_dir="artifacts/publish/${rid}"
                  mkdir -p artifacts/packages

                  if [[ "$rid" == win-* ]]; then
                    archive="artifacts/packages/chip8-${tag}-${rid}.zip"
                    (cd "$source_dir" && zip -qr "${GITHUB_WORKSPACE}/${archive}" .)
                  else
                    archive="artifacts/packages/chip8-${tag}-${rid}.tar.gz"
                    tar -czf "$archive" -C "$source_dir" .
                  fi

            - name: Upload runtime package artifact
              if: matrix.rid != 'osx-arm64'
              uses: actions/upload-artifact@v4
              with:
                  name: package-${{ matrix.rid }}
                  path: artifacts/packages/*

    windows-installer:
        name: Windows Installers
        needs: publish
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download Windows publish artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts/publish

            - name: Install Inno Setup
              run: choco install innosetup --no-progress -y

            - name: Build installers
              shell: pwsh
              run: |
                  $version = "${{ github.ref_name }}" -replace '^v',''
                  $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
                  if (-not (Test-Path $iscc)) {
                    throw "ISCC.exe not found at $iscc"
                  }

                  $targets = @(
                    @{ Rid = 'win-x86'; Arch = 'x86' },
                    @{ Rid = 'win-x64'; Arch = 'x64' },
                    @{ Rid = 'win-arm64'; Arch = 'arm64' }
                  )

                  New-Item -ItemType Directory -Path artifacts/installers -Force | Out-Null

                  foreach ($target in $targets) {
                    $sourceDir = Join-Path $PWD "artifacts/publish/publish-$($target.Rid)"
                    if (-not (Test-Path $sourceDir)) {
                      throw "Missing publish artifact directory: $sourceDir"
                    }

                    $outputBase = "chip8-$version-$($target.Rid)-setup"
                    & $iscc `
                      "/DSourceDir=$sourceDir" `
                      "/DOutputDir=$(Join-Path $PWD 'artifacts/installers')" `
                      "/DOutputBase=$outputBase" `
                      "/DMyAppVersion=$version" `
                      "/DArch=$($target.Arch)" `
                      "build/windows/chip8.iss"
                  }

            - name: Upload Windows installers
              uses: actions/upload-artifact@v4
              with:
                  name: windows-installers
                  path: artifacts/installers/*.exe

    flatpak:
        name: Linux Flatpak (${{ matrix.rid }})
        needs: publish
        strategy:
            fail-fast: false
            matrix:
                include:
                    - rid: linux-x64
                      flatpak_arch: x86_64
                      runner: ubuntu-latest
                    - rid: linux-arm64
                      flatpak_arch: aarch64
                      runner: ubuntu-24.04-arm

        runs-on: ${{ matrix.runner }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download Linux publish artifact
              uses: actions/download-artifact@v4
              with:
                  name: publish-${{ matrix.rid }}
                  path: artifacts/publish/${{ matrix.rid }}

            - name: Prepare Flatpak app root
              run: |
                  set -euo pipefail
                  mkdir -p packaging/flatpak/root
                  cp -r artifacts/publish/${{ matrix.rid }}/* packaging/flatpak/root/
                  chmod +x packaging/flatpak/root/Chip8 || true

            - name: Install Flatpak tooling
              run: |
                  sudo apt-get update
                  sudo apt-get install -y flatpak flatpak-builder
                  flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

            - name: Build Flatpak
              run: |
                  set -euo pipefail
                  flatpak-builder --force-clean --arch=${{ matrix.flatpak_arch }} --user --install-deps-from=flathub --repo=repo build-flatpak packaging/flatpak/io.github.vitimiti.chip8.yml

            - name: Bundle Flatpak
              run: |
                  set -euo pipefail
                  flatpak build-bundle --arch=${{ matrix.flatpak_arch }} repo chip8-${{ matrix.rid }}.flatpak io.github.vitimiti.chip8 stable

            - name: Upload Flatpak artifact
              uses: actions/upload-artifact@v4
              with:
                  name: flatpak-${{ matrix.rid }}
                  path: chip8-${{ matrix.rid }}.flatpak

    macos-dmg:
        name: macOS DMG
        needs: publish
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download osx-arm64 publish artifact
              uses: actions/download-artifact@v4
              with:
                  name: publish-osx-arm64
                  path: artifacts/publish/osx-arm64

            - name: Download SDL3 3.4.10 macOS runtime
              shell: bash
              run: |
                  set -euo pipefail
                  curl -fL -o sdl3-macos.dmg https://github.com/libsdl-org/SDL/releases/download/release-3.4.10/SDL3-3.4.10.dmg
                  hdiutil attach sdl3-macos.dmg -mountpoint /Volumes/SDL3

            - name: Extract SDL3 dylib
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p artifacts/sdl3

                  dylib_path="$(find /Volumes/SDL3 -type f -name 'libSDL3*.dylib' | head -n 1)"
                  if [[ -n "${dylib_path}" ]]; then
                    cp "${dylib_path}" artifacts/sdl3/libSDL3.dylib
                  else
                    framework_binary="$(find /Volumes/SDL3 -type f -path '*SDL3.framework/Versions/A/SDL3' | head -n 1)"
                    if [[ -z "${framework_binary}" ]]; then
                      echo "Could not find libSDL3*.dylib or SDL3.framework binary in SDL3-3.4.10.dmg"
                      exit 1
                    fi

                    cp "${framework_binary}" artifacts/sdl3/libSDL3.dylib
                  fi

                  hdiutil detach /Volumes/SDL3

            - name: Create app bundle
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p dist/Chip8.app/Contents/MacOS
                  mkdir -p dist/Chip8.app/Contents/Resources
                  cp -R artifacts/publish/osx-arm64/* dist/Chip8.app/Contents/MacOS/
                  cp artifacts/sdl3/libSDL3.dylib dist/Chip8.app/Contents/MacOS/libSDL3.dylib
                  chmod +x dist/Chip8.app/Contents/MacOS/Chip8 || true

            - name: Package osx-arm64 runtime output
              shell: bash
              run: |
                  set -euo pipefail
                  version="${{ github.ref_name }}"
                  source_dir="artifacts/publish/osx-arm64"
                  cp artifacts/sdl3/libSDL3.dylib "${source_dir}/libSDL3.dylib"
                  mkdir -p artifacts/packages
                  tar -czf "artifacts/packages/chip8-${version}-osx-arm64.tar.gz" -C "${source_dir}" .

            - name: Upload osx-arm64 runtime package artifact
              uses: actions/upload-artifact@v4
              with:
                  name: package-osx-arm64
                  path: artifacts/packages/*.tar.gz

            - name: Create Info.plist
              shell: bash
              run: |
                  set -euo pipefail

                  cat > dist/Chip8.app/Contents/Info.plist <<'PLIST'
                  <?xml version="1.0" encoding="UTF-8"?>
                  <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                  <plist version="1.0">
                  <dict>
                    <key>CFBundleName</key>
                    <string>Chip8</string>
                    <key>CFBundleDisplayName</key>
                    <string>Chip8</string>
                    <key>CFBundleIdentifier</key>
                    <string>io.github.vitimiti.chip8</string>
                    <key>CFBundleVersion</key>
                    <string>${{ github.ref_name }}</string>
                    <key>CFBundleShortVersionString</key>
                    <string>${{ github.ref_name }}</string>
                    <key>CFBundleExecutable</key>
                    <string>Chip8</string>
                    <key>CFBundlePackageType</key>
                    <string>APPL</string>
                  </dict>
                  </plist>
                  PLIST

            - name: Build DMG
              shell: bash
              run: |
                  set -euo pipefail
                  hdiutil create -volname "Chip8" -srcfolder dist/Chip8.app -ov -format UDZO chip8-osx-arm64.dmg

            - name: Upload DMG artifact
              uses: actions/upload-artifact@v4
              with:
                  name: macos-dmg-osx-arm64
                  path: chip8-osx-arm64.dmg

    github-release:
        name: GitHub Release
        needs:
            - publish
            - windows-installer
            - flatpak
            - macos-dmg
        runs-on: ubuntu-latest

        steps:
            - name: Download publish artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: publish-*
                  path: release-assets/publish

            - name: Download runtime packages
              uses: actions/download-artifact@v4
              with:
                  pattern: package-*
                  path: release-assets/packages

            - name: Download Windows installers
              uses: actions/download-artifact@v4
              with:
                  name: windows-installers
                  path: release-assets/windows-installers

            - name: Download Flatpak bundle
              uses: actions/download-artifact@v4
              with:
                  pattern: flatpak-*
                  path: release-assets/flatpak

            - name: Download macOS DMG
              uses: actions/download-artifact@v4
              with:
                  name: macos-dmg-osx-arm64
                  path: release-assets/macos

            - name: Generate checksums
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p release-assets/checksums
                  output_file="release-assets/checksums/SHA256SUMS.txt"
                  : > "$output_file"

                  mapfile -t files < <(find release-assets -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.exe' -o -name '*.flatpak' -o -name '*.dmg' \) | sort)

                  if [[ ${#files[@]} -eq 0 ]]; then
                    echo "No release files found for checksum generation."
                    exit 1
                  fi

                  for file in "${files[@]}"; do
                    sha256sum "$file" >> "$output_file"
                    checksum="$(sha256sum "$file" | awk '{print $1}')"
                    printf "%s  %s\n" "$checksum" "$(basename "$file")" > "release-assets/checksums/$(basename "$file").sha256"
                  done

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  generate_release_notes: true
                  files: |
                      release-assets/packages/**/*.zip
                      release-assets/packages/**/*.tar.gz
                      release-assets/windows-installers/*.exe
                      release-assets/flatpak/**/*.flatpak
                      release-assets/macos/*.dmg
                      release-assets/checksums/SHA256SUMS.txt
                      release-assets/checksums/*.sha256
